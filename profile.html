<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Traveler Profile | Wanderlog</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="stylesheet" href="style.css"></head><body>
<header><a href="index.html" class="logo"><img src="logo.png" class="logo-img" alt="Wanderlog logo">Wanderlog</a><nav aria-label="Main navigation"><ul><li><a href="index.html">Home</a></li><li><a href="destinations.html">Destinations</a></li><li><a href="index.html#about">About</a></li><li><a href="profile.html" class="profile-nav-link">Profile</a></li></ul></nav></header>
<main><section class="profile-header"><div class="profile-avatar" id="profile-avatar">🧭</div><h1 id="profile-name">Traveler</h1><p id="profile-bio">Third-year CS student building Wanderlog one week at a time. Always planning the next trip.</p><button id="edit-profile-btn" class="add-trip-link">Edit profile</button></section><section class="add-trip" id="edit-profile-form"><h2>Edit Your Profile</h2><form id="profile-form"><div class="form-group"><label for="profileNameInput">Name</label><input type="text" id="profileNameInput" required></div><div class="form-group"><label for="profileBioInput">Bio</label><textarea id="profileBioInput" rows="3"></textarea></div><div class="form-group"><label for="profileAvatarInput">Profile Photo</label><input type="file" id="profileAvatarInput" accept="image/*"><img id="profile-avatar-preview" class="image-preview" alt="Avatar preview" style="display:none;"></div><button type="submit" class="cta">Save Profile</button></form></section><section class="journal-section"><h2>Trips (<span id="profile-trip-count">0</span>)</h2><div id="profile-trips-container"></div></section></main>
