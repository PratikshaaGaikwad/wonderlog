<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wanderlog — Your Travel Journal</title>
  <meta name="description" content="Wanderlog is a simple place to record your travels — routes, meals, and moments worth remembering." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700&family=Work+Sans:wght@400;500&family=Space+Mono&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <a href="#" class="logo"><img src="logo.png" alt="Wanderlog logo" class="logo-img" />Wanderlog</a>

    <nav aria-label="Main navigation">
      <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">Destinations</a></li>
        <li><a href="#">About</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="hero">
      <h1>Every trip has a story. Write yours.</h1>
      <p>
        Capture every destination, every memory, and every adventure in one beautiful travel journal.
      </p>
      <a href="#" class="cta">Start Your Journey →</a>
    </section>
    <section class="add-trip" id="add-trip">
  <h2>Add a New Trip</h2>
  <form id="trip-form">
    <div class="form-group">
      <label for="title">Trip Title</label>
      <input type="text" id="title" name="title" required />
    </div>

    <div class="form-group">
      <label for="destination">Destination</label>
      <input type="text" id="destination" name="destination" required />
    </div>

    <div class="form-group">
      <label for="date">Date</label>
      <input type="date" id="date" name="date" required />
    </div>

    <div class="form-group">
      <label for="notes">Notes</label>
      <textarea id="notes" name="notes"></textarea>
    </div>

    <div class="form-group">
      <label for="coverImage">Cover Image URL</label>
      <input type="url" id="coverImage" name="coverImage" placeholder="https://..." />
    </div>

    <button type="submit" class="cta" id="submit-btn">Add Trip</button>
  </form>
</section>

<section class="trips-list">
  <h2 id="trips-heading">My Trips (0) ✈️</h2>
  <div id="trips-container">
    <!-- Trip cards will be inserted here by js -->
  </div>
</section>
  </main>
  <div id="toast" class="toast"></div>

  <footer>
    <p>&copy; 2026 Wanderlog. Explore. Capture. Remember.</p>
  </footer>
<script src="script.js"> </script>
</body>
</html>
